kind: CronJob
apiVersion: batch/v1
metadata:
  name: mycronjob
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: webcont
            image: ubuntu
            command: ["/bin/bash", "-c", "echo 'Hello sumeet-singh'; sleep 10"]
          restartPolicy: Never
