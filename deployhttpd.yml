kind: Deployment
apiVersion: apps/v1
metadata:
  name: mydeploymentshttpd

spec:
  replicas: 4
  selector:
    matchLabels:
      app: deployment 

  template:
    metadata:
      labels:
        app: deployment
    spec:
      containers:
        - name: c00
          image: httpd
          ports:
            - containerPort: 80
