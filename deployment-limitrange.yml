kind: Deployment
apiVersion: apps/v1
metadata:
  name: mydeployment
spec:
  replicas: 3
  selector:
    matchLabels:
      objecttype: deployment

  template:
    metadata:
      labels:
        objecttype: deployment
    spec:
     containers:
       - name: c00
         image: debian
         command: ["/bin/bash", "-c", "while true; do echo 'Hello from deployment debian containers:'; done "]

         resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "300m"
            memory: "300Mi"
