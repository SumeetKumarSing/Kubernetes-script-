kind: Deployment
apiVersion: apps/v1
metadata:
  name: efsdeploy

spec:
  replicas: 2
  selector:
    matchLabels:
      app: mypv
  
  template:
    metadata:
      labels: 
        app: mypv
    
    spec:
      containers:
        - name: c001
          image: ubuntu
          command: [ "/bin/bash", "-c","while true; do echo Hello sumeet-singh; sleep 5; done"]
          volumeMounts:
          - name: myvolume
            mountPath: "/tmp/contvol"

      volumes: 
        - name: myvolume
          persistentVolumeClaim: 
            claimName: myefspvclaim01
