kind: Pod
apiVersion: v1
metadata:
  name: myprod
spec:
  
  initContainers:
  - name: c1
    image: ubuntu
    command: ["/bin/bash","-c","echo 'hello sumeet from init cont' > /tmp/c1dir/samplefile; sleep 20"]
    volumeMounts:
      - name: myvol
        mountPath: "/tmp/c1dir"

  containers:
  - name: c2
    image: ubuntu
    command: [ "/bin/bash", "-c", "sleep infinity"]
    volumeMounts:
      - name: myvol
        mountPath: "/tmp/c2dir"
  
  volumes:
  - name: myvol
    emptyDir: {}
